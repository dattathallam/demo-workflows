name: Demo all action types

on:
  push:
  workflow_dispatch:

jobs:
  # ── GATE JOB ──────────────────────────────────────────────────────────────
  # Runs compliance first on a Linux runner. Scans its own _actions/ and posts
  # to the webhook. If this job fails (e.g. compliance blocks an action) the
  # downstream jobs never start.
  # Both downstream jobs still run their own checkout + compliance because:
  #   1. Workspaces are not shared across jobs — checkout is always per-job.
  #   2. _actions/ is per-job — compliance must run in the same job as the
  #      steps it protects (so it can inspect/override before those steps run).
  # ──────────────────────────────────────────────────────────────────────────
  compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compliance scan
        uses: dattathallam/gh-action-compliance@main
        with:
          webhook-url: https://webhook.site/8e7e7cde-8cad-4d83-b10b-a02d51773ea7
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # ── NODE + COMPOSITE (macOS self-hosted) ──────────────────────────────────
  # Node and composite actions work on any OS.
  # ──────────────────────────────────────────────────────────────────────────
  node-and-composite:
    needs: compliance
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Compliance scan
        uses: dattathallam/gh-action-compliance@main
        with:
          webhook-url: https://webhook.site/8e7e7cde-8cad-4d83-b10b-a02d51773ea7
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # 1. JavaScript / Node.js action
      - name: Node greeter
        id: js
        uses: dattathallam/gh-action-node@main
        with:
          name: GitHub
          greeting: Hey

      # 2. Composite action (chains checkout + node greeter internally)
      - name: Composite greeter
        id: composite
        uses: dattathallam/gh-action-composite@main
        with:
          name: Composite World
          greeting: Greetings

      - name: Print outputs
        run: |
          echo "JS output:        ${{ steps.js.outputs.message }}"
          echo "Composite output: ${{ steps.composite.outputs.message }}"

  # ── DOCKER ACTIONS (GitHub-hosted Linux) ──────────────────────────────────
  # Docker container actions, Go/Docker actions, and docker:// images all
  # require Linux — use GitHub-hosted ubuntu-latest.
  # ──────────────────────────────────────────────────────────────────────────
  docker-actions:
    needs: compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: List pre-pulled Docker images on runner
        run: |
          echo "Images already present on this runner before any step pulls or builds:"
          docker images

      - name: Compliance scan
        uses: dattathallam/gh-action-compliance@main
        with:
          webhook-url: https://webhook.site/8e7e7cde-8cad-4d83-b10b-a02d51773ea7
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # 3. Docker container action
      - name: Docker file inspector
        id: docker
        uses: dattathallam/gh-action-docker@main
        with:
          file-path: README.md

      # 4. Go binary via Docker action
      - name: Go word counter
        id: go
        uses: dattathallam/gh-action-go@v1
        with:
          text: "Hello from a Go Docker action"

      # 5. Pre-built Docker image (docker:// shorthand)
      # No action.yml, no _actions/ entry — runner calls docker pull directly.
      - name: Pre-built Docker image (alpine)
        id: alpine
        uses: docker://alpine:3.19
        with:
          entrypoint: /bin/sh
          args: -c "echo Hello from alpine && echo alpine_version=$(cat /etc/alpine-release)"

      - name: Print outputs
        run: |
          echo "Docker output:    ${{ steps.docker.outputs.file-info }}"
          echo "Go output:        ${{ steps.go.outputs.word-count }} words"
